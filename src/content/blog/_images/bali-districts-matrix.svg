<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="system-ui,-apple-system,sans-serif">
  <title>Районы Бали — для кого подходит каждый</title>
  <desc>Сравнительная матрица 8 районов Бали по 5 критериям: цена, тусовка, для семьи с детьми, удалённая работа, серфинг.</desc>
  <rect width="800" height="480" fill="#131009"/>
  <text x="400" y="32" text-anchor="middle" fill="#c9973a" font-size="13" font-weight="600" letter-spacing="2">РАЙОНЫ БАЛИ — МАТРИЦА ВЫБОРА</text>
  <text x="400" y="52" text-anchor="middle" fill="#a8a090" font-size="11">● — отлично подходит   ◐ — частично   ○ — не для этого</text>

  <g font-size="12" fill="#e8e0d0">
    <text x="180" y="92" font-weight="600" fill="#c9973a">Район</text>
    <text x="290" y="92" text-anchor="middle" font-size="11" fill="#a8a090">Цена $/ночь</text>
    <text x="400" y="92" text-anchor="middle" font-size="11" fill="#a8a090">Тусовка</text>
    <text x="490" y="92" text-anchor="middle" font-size="11" fill="#a8a090">С детьми</text>
    <text x="590" y="92" text-anchor="middle" font-size="11" fill="#a8a090">Удалёнка</text>
    <text x="690" y="92" text-anchor="middle" font-size="11" fill="#a8a090">Серфинг</text>
    <line x1="40" y1="100" x2="760" y2="100" stroke="#3a3429" stroke-width="1"/>

    <text x="50" y="125">Кута</text>
    <text x="290" y="125" text-anchor="middle" fill="#5cc97a">$30–60</text>
    <text x="400" y="125" text-anchor="middle" fill="#5cc97a" font-size="16">●</text>
    <text x="490" y="125" text-anchor="middle" fill="#a8a090" font-size="16">○</text>
    <text x="590" y="125" text-anchor="middle" fill="#e8c062" font-size="16">◐</text>
    <text x="690" y="125" text-anchor="middle" fill="#5cc97a" font-size="16">●</text>

    <text x="50" y="155">Семиньяк</text>
    <text x="290" y="155" text-anchor="middle" fill="#e8c062">$80–150</text>
    <text x="400" y="155" text-anchor="middle" fill="#5cc97a" font-size="16">●</text>
    <text x="490" y="155" text-anchor="middle" fill="#e8c062" font-size="16">◐</text>
    <text x="590" y="155" text-anchor="middle" fill="#e8c062" font-size="16">◐</text>
    <text x="690" y="155" text-anchor="middle" fill="#e8c062" font-size="16">◐</text>

    <text x="50" y="185">Чангу</text>
    <text x="290" y="185" text-anchor="middle" fill="#e8c062">$60–120</text>
    <text x="400" y="185" text-anchor="middle" fill="#5cc97a" font-size="16">●</text>
    <text x="490" y="185" text-anchor="middle" fill="#a8a090" font-size="16">○</text>
    <text x="590" y="185" text-anchor="middle" fill="#5cc97a" font-size="16">●</text>
    <text x="690" y="185" text-anchor="middle" fill="#5cc97a" font-size="16">●</text>

    <text x="50" y="215">Убуд</text>
    <text x="290" y="215" text-anchor="middle" fill="#5cc97a">$40–100</text>
    <text x="400" y="215" text-anchor="middle" fill="#a8a090" font-size="16">○</text>
    <text x="490" y="215" text-anchor="middle" fill="#e8c062" font-size="16">◐</text>
    <text x="590" y="215" text-anchor="middle" fill="#5cc97a" font-size="16">●</text>
    <text x="690" y="215" text-anchor="middle" fill="#a8a090" font-size="16">○</text>

    <text x="50" y="245">Санур</text>
    <text x="290" y="245" text-anchor="middle" fill="#e8c062">$50–110</text>
    <text x="400" y="245" text-anchor="middle" fill="#a8a090" font-size="16">○</text>
    <text x="490" y="245" text-anchor="middle" fill="#5cc97a" font-size="16">●</text>
    <text x="590" y="245" text-anchor="middle" fill="#e8c062" font-size="16">◐</text>
    <text x="690" y="245" text-anchor="middle" fill="#a8a090" font-size="16">○</text>

    <text x="50" y="275">Нуса Дуа</text>
    <text x="290" y="275" text-anchor="middle" fill="#d44545">$200+</text>
    <text x="400" y="275" text-anchor="middle" fill="#a8a090" font-size="16">○</text>
    <text x="490" y="275" text-anchor="middle" fill="#5cc97a" font-size="16">●</text>
    <text x="590" y="275" text-anchor="middle" fill="#a8a090" font-size="16">○</text>
    <text x="690" y="275" text-anchor="middle" fill="#a8a090" font-size="16">○</text>

    <text x="50" y="305">Джимбаран</text>
    <text x="290" y="305" text-anchor="middle" fill="#e8c062">$80–180</text>
    <text x="400" y="305" text-anchor="middle" fill="#a8a090" font-size="16">○</text>
    <text x="490" y="305" text-anchor="middle" fill="#5cc97a" font-size="16">●</text>
    <text x="590" y="305" text-anchor="middle" fill="#a8a090" font-size="16">○</text>
    <text x="690" y="305" text-anchor="middle" fill="#a8a090" font-size="16">○</text>

    <text x="50" y="335">Улувату</text>
    <text x="290" y="335" text-anchor="middle" fill="#e8c062">$100–200</text>
    <text x="400" y="335" text-anchor="middle" fill="#a8a090" font-size="16">○</text>
    <text x="490" y="335" text-anchor="middle" fill="#a8a090" font-size="16">○</text>
    <text x="590" y="335" text-anchor="middle" fill="#e8c062" font-size="16">◐</text>
    <text x="690" y="335" text-anchor="middle" fill="#5cc97a" font-size="16">●</text>
  </g>

  <g font-size="11" fill="#a8a090">
    <line x1="40" y1="365" x2="760" y2="365" stroke="#3a3429" stroke-width="1"/>
    <text x="60" y="390" fill="#e8e0d0" font-weight="600">Подсказка для первого раза:</text>
    <text x="60" y="412">• Пара 25–40 лет: Семиньяк или Чангу</text>
    <text x="60" y="430">• Семья с детьми: Санур или Джимбаран</text>
    <text x="60" y="448">• Удалёнщик: Чангу + 2–3 дня в Убуде</text>
    <text x="60" y="466">• Бюджетный первый раз: Кута</text>
  </g>
</svg>
