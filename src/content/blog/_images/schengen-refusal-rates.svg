<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" font-family="system-ui,-apple-system,sans-serif">
  <title>Отказы в шенгенских визах для россиян по странам — 2024</title>
  <desc>Италия 6%, Швейцария 6%, Словения 7%, Франция 7%, Венгрия 8%, Испания 9%, Хорватия 10%, Греция 12%, Германия 15%, Чехия 17%, Швеция 21%, Эстония 23%, Австрия 23%, Мальта 27%.</desc>
  <rect width="800" height="540" fill="#131009"/>
  <text x="400" y="32" text-anchor="middle" fill="#c9973a" font-size="13" font-weight="600" letter-spacing="2">ОТКАЗЫ В ШЕНГЕНЕ ДЛЯ РОССИЯН — 2024</text>
  <text x="400" y="52" text-anchor="middle" fill="#a8a090" font-size="11">Источник: официальная статистика Migration and Home Affairs ЕС</text>

  <g font-size="13" fill="#e8e0d0">
    <text x="200" y="86" text-anchor="end">🇮🇹 Италия</text><rect x="210" y="74" width="48" height="16" fill="#5cc97a"/><text x="265" y="86" fill="#5cc97a" font-weight="600">6%</text>
    <text x="200" y="116" text-anchor="end">🇨🇭 Швейцария</text><rect x="210" y="104" width="48" height="16" fill="#5cc97a"/><text x="265" y="116" fill="#5cc97a" font-weight="600">6%</text>
    <text x="200" y="146" text-anchor="end">🇸🇮 Словения</text><rect x="210" y="134" width="56" height="16" fill="#5cc97a"/><text x="273" y="146" fill="#5cc97a" font-weight="600">7%</text>
    <text x="200" y="176" text-anchor="end">🇫🇷 Франция</text><rect x="210" y="164" width="56" height="16" fill="#5cc97a"/><text x="273" y="176" fill="#5cc97a" font-weight="600">7%</text>
    <text x="200" y="206" text-anchor="end">🇭🇺 Венгрия</text><rect x="210" y="194" width="64" height="16" fill="#5cc97a"/><text x="281" y="206" fill="#5cc97a" font-weight="600">8%</text>
    <text x="200" y="236" text-anchor="end">🇪🇸 Испания</text><rect x="210" y="224" width="72" height="16" fill="#5cc97a"/><text x="289" y="236" fill="#5cc97a" font-weight="600">9%</text>
    <text x="200" y="266" text-anchor="end">🇭🇷 Хорватия</text><rect x="210" y="254" width="80" height="16" fill="#e8c062"/><text x="297" y="266" fill="#e8c062" font-weight="600">10%</text>
    <text x="200" y="296" text-anchor="end">🇬🇷 Греция</text><rect x="210" y="284" width="96" height="16" fill="#e8c062"/><text x="313" y="296" fill="#e8c062" font-weight="600">12%</text>
    <text x="200" y="326" text-anchor="end">🇩🇪 Германия</text><rect x="210" y="314" width="120" height="16" fill="#e8c062"/><text x="337" y="326" fill="#e8c062" font-weight="600">15%</text>
    <text x="200" y="356" text-anchor="end">🇨🇿 Чехия</text><rect x="210" y="344" width="136" height="16" fill="#e8c062"/><text x="353" y="356" fill="#e8c062" font-weight="600">17%</text>
    <text x="200" y="386" text-anchor="end">🇸🇪 Швеция</text><rect x="210" y="374" width="168" height="16" fill="#e87a3a"/><text x="385" y="386" fill="#e87a3a" font-weight="600">21%</text>
    <text x="200" y="416" text-anchor="end">🇪🇪 Эстония</text><rect x="210" y="404" width="184" height="16" fill="#e87a3a"/><text x="401" y="416" fill="#e87a3a" font-weight="600">23%</text>
    <text x="200" y="446" text-anchor="end">🇦🇹 Австрия</text><rect x="210" y="434" width="184" height="16" fill="#e87a3a"/><text x="401" y="446" fill="#e87a3a" font-weight="600">23%</text>
    <text x="200" y="476" text-anchor="end">🇲🇹 Мальта</text><rect x="210" y="464" width="216" height="16" fill="#d44545"/><text x="433" y="476" fill="#d44545" font-weight="600">27%</text>
  </g>

  <g font-size="11" fill="#a8a090">
    <rect x="220" y="500" width="14" height="10" fill="#5cc97a"/><text x="240" y="509">≤9% — лояльные</text>
    <rect x="350" y="500" width="14" height="10" fill="#e8c062"/><text x="370" y="509">10–18% — средние</text>
    <rect x="490" y="500" width="14" height="10" fill="#e87a3a"/><text x="510" y="509">19–25% — жёсткие</text>
    <rect x="610" y="500" width="14" height="10" fill="#d44545"/><text x="630" y="509">26%+ — избегать</text>
  </g>
</svg>
