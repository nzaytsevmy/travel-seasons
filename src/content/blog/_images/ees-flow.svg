<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" font-family="system-ui,-apple-system,sans-serif">
  <title>EES — процедура первого въезда в Шенген</title>
  <desc>5 шагов: паспорт, отпечатки 10 пальцев, фото лица, опрос пограничника, въезд без штампа в паспорт.</desc>
  <rect width="800" height="240" fill="#131009"/>
  <text x="400" y="32" text-anchor="middle" fill="#c9973a" font-size="13" font-weight="600" letter-spacing="2">EES — ПРОЦЕДУРА ПЕРВОГО ВЪЕЗДА</text>

  <g font-size="13" fill="#e8e0d0">
    <rect x="20" y="70" width="130" height="110" rx="6" fill="#1a1610" stroke="#c9973a" stroke-width="1.2"/>
    <text x="85" y="100" text-anchor="middle" fill="#c9973a" font-size="18" font-weight="700">1</text>
    <text x="85" y="128" text-anchor="middle" font-weight="600">Паспорт</text>
    <text x="85" y="148" text-anchor="middle" fill="#a8a090" font-size="11">скан, проверка визы</text>

    <rect x="174" y="70" width="130" height="110" rx="6" fill="#1a1610" stroke="#c9973a" stroke-width="1.2"/>
    <text x="239" y="100" text-anchor="middle" fill="#c9973a" font-size="18" font-weight="700">2</text>
    <text x="239" y="128" text-anchor="middle" font-weight="600">Отпечатки</text>
    <text x="239" y="148" text-anchor="middle" fill="#a8a090" font-size="11">10 пальцев</text>

    <rect x="328" y="70" width="130" height="110" rx="6" fill="#1a1610" stroke="#c9973a" stroke-width="1.2"/>
    <text x="393" y="100" text-anchor="middle" fill="#c9973a" font-size="18" font-weight="700">3</text>
    <text x="393" y="128" text-anchor="middle" font-weight="600">Фото лица</text>
    <text x="393" y="148" text-anchor="middle" fill="#a8a090" font-size="11">без очков, без улыбки</text>

    <rect x="482" y="70" width="130" height="110" rx="6" fill="#1a1610" stroke="#c9973a" stroke-width="1.2"/>
    <text x="547" y="100" text-anchor="middle" fill="#c9973a" font-size="18" font-weight="700">4</text>
    <text x="547" y="128" text-anchor="middle" font-weight="600">Опрос</text>
    <text x="547" y="148" text-anchor="middle" fill="#a8a090" font-size="11">цель, маршрут</text>

    <rect x="636" y="70" width="130" height="110" rx="6" fill="#1a1610" stroke="#5cc97a" stroke-width="1.5"/>
    <text x="701" y="100" text-anchor="middle" fill="#5cc97a" font-size="18" font-weight="700">5</text>
    <text x="701" y="128" text-anchor="middle" font-weight="600">Въезд</text>
    <text x="701" y="148" text-anchor="middle" fill="#a8a090" font-size="11">штампа НЕТ</text>
  </g>

  <g stroke="#c9973a" stroke-width="1.2" fill="none">
    <path d="M 154 125 L 170 125" marker-end="url(#arr)"/>
    <path d="M 308 125 L 324 125" marker-end="url(#arr)"/>
    <path d="M 462 125 L 478 125" marker-end="url(#arr)"/>
    <path d="M 616 125 L 632 125" marker-end="url(#arr)"/>
  </g>

  <text x="400" y="215" text-anchor="middle" fill="#a8a090" font-size="11">Время процедуры: 5–10 минут. Повторно в течение 3 лет — только сканирование лица (30–60 сек).</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#c9973a"/>
    </marker>
  </defs>
</svg>
