<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300" font-family="system-ui,-apple-system,sans-serif">
<title>Хургада или Шарм-эль-Шейх — матрица выбора</title>
<desc>Сравнение Хургады и Шарм-эль-Шейха по 6 критериям: дайвинг, цена, для семьи, синайский безвиз, ночная жизнь, тишина.</desc>
<rect width="860" height="300" fill="#131009"/>
<text x="430" y="34" text-anchor="middle" fill="#c9973a" font-size="14" font-weight="600" letter-spacing="2">ХУРГАДА или ШАРМ — МАТРИЦА ВЫБОРА</text>
<text x="430" y="56" text-anchor="middle" fill="#a8a090" font-size="11">● отлично   ◐ средне   ○ слабо</text>
<text x="262" y="92" text-anchor="middle" fill="#a8a090" font-size="10.5" font-weight="600">Дайвинг</text>
<text x="365" y="92" text-anchor="middle" fill="#a8a090" font-size="10.5" font-weight="600">Цена</text>
<text x="468" y="92" text-anchor="middle" fill="#a8a090" font-size="10.5" font-weight="600">Для семьи</text>
<text x="572" y="92" text-anchor="middle" fill="#a8a090" font-size="10.5" font-weight="600">Синай-безвиз</text>
<text x="675" y="92" text-anchor="middle" fill="#a8a090" font-size="10.5" font-weight="600">Ночная жизнь</text>
<text x="778" y="92" text-anchor="middle" fill="#a8a090" font-size="10.5" font-weight="600">Тишина</text>
<line x1="40" y1="102" x2="820" y2="102" stroke="#3a3429" stroke-width="1"/>
<text x="48" y="134" fill="#e8e0d0" font-size="13" font-weight="600">Хургада</text>
<text x="262" y="136" text-anchor="middle" fill="#e8c062" font-size="20">◐</text>
<text x="365" y="136" text-anchor="middle" fill="#5cc97a" font-size="20">●</text>
<text x="468" y="136" text-anchor="middle" fill="#5cc97a" font-size="20">●</text>
<text x="572" y="136" text-anchor="middle" fill="#a8a090" font-size="20">○</text>
<text x="675" y="136" text-anchor="middle" fill="#5cc97a" font-size="20">●</text>
<text x="778" y="136" text-anchor="middle" fill="#a8a090" font-size="20">○</text>
<text x="48" y="180" fill="#e8e0d0" font-size="13" font-weight="600">Шарм-эль-Шейх</text>
<text x="262" y="182" text-anchor="middle" fill="#5cc97a" font-size="20">●</text>
<text x="365" y="182" text-anchor="middle" fill="#e8c062" font-size="20">◐</text>
<text x="468" y="182" text-anchor="middle" fill="#e8c062" font-size="20">◐</text>
<text x="572" y="182" text-anchor="middle" fill="#5cc97a" font-size="20">●</text>
<text x="675" y="182" text-anchor="middle" fill="#e8c062" font-size="20">◐</text>
<text x="778" y="182" text-anchor="middle" fill="#5cc97a" font-size="20">●</text>
<line x1="40" y1="230" x2="820" y2="230" stroke="#3a3429" stroke-width="1"/>
<text x="48" y="256" fill="#e8e0d0" font-size="12" font-weight="600">Как выбрать:</text>
<text x="48" y="276" fill="#a8a090" font-size="11.5">Хургада — семьи с детьми, бюджет, ночная жизнь, пологий песок. Шарм — дайвинг и кораллы у берега, синайский безвиз 15 дней, тишина.</text>
</svg>