    </pattern>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="rgba(201,151,58,0.18)"/>
      <stop offset="60%" stop-color="rgba(201,151,58,0.05)"/>
      <stop offset="100%" stop-color="rgba(201,151,58,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0c0a08"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <rect width="1200" height="2" fill="#c9973a" opacity="0.6"/>

  <circle cx="80" cy="68" r="6" fill="#c9973a"/>
