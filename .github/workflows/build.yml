name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  # Гейт свежести: правка контента/данных обязана бампать DATA_UPDATED (meta.js),
  # иначе sitemap lastmod и byline «данные проверены …» соврут о дате. Ловит
  # застой даты (было: 5 релизов подряд на замороженной 2026-06-29).
  freshness-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: DATA_UPDATED freshness gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # core.quotePath=false обязателен: иначе git экранирует не-ASCII пути в
          # "src/content/\320\262..." — строка начинается с кавычки, grep '^src/' мимо,
          # и файл с кириллическим слагом молча минует гейт целиком.
          CHANGED=$(git -c core.quotePath=false diff --name-only "$BASE_SHA" "$HEAD_SHA")
          CONTENT=$(echo "$CHANGED" | grep -E '^src/(content|data)/' | grep -vE '^src/data/(prices-cache\.json|meta\.js)$' || true)
          # У поста и у программных данных РАЗНЫЕ носители свежести, гейт их не смешивает:
          #  • пост  → его собственный updatedDate (из неё astro.config.mjs берёт sitemap
          #    lastmod — там прямо сказано, что иначе sitemap инфлирует свежесть всех URL);
          #  • src/data/*.js → DATA_UPDATED (meta.js), её byline программных страниц
          #    (visa/hub/seasons/calculator) заявляет как «цены и визовые правила
          #    проверены на дату X».
          # Требовать бамп DATA_UPDATED за правку поста — значит заставлять врать о
          # проверке цен, которой не было.
          # Помечаем разбор префиксом: POST = пост правлен без бампа updatedDate,
          # DATA = фактура данных, ждёт DATA_UPDATED.
          VERDICT=$(
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              # Скобки у шаблонов case обязательны: без ведущей `(` bash принимает
              # закрывающую `)` за конец подстановки $( ... ) — синтаксическая ошибка.
              # Исключение — только текстовые посты: у бинарников (картинки в
              # src/content/blog/_images/) дифф не даёт строк +/-, и они молча
              # сошли бы за «не фактуру». Они падают в общий случай, как раньше.
              case "$f" in
                (src/content/*)
                  ST=$(git -c core.quotePath=false diff --name-status "$BASE_SHA" "$HEAD_SHA" -- "$f" | cut -f1) || exit 3
                  # Новый контент поста (сам .mdx и его обложка) соврать о свежести не
                  # может: его дата — pubDate во фронтматтере, она же уходит в sitemap.
                  # Бампать нечего. ЗАМЕНА существующего файла ниже ловится как раньше.
                  if [ "$ST" = "A" ]; then continue; fi
                  case "$f" in
                    (*.md|*.mdx)
                      FDIFF=$(git -c core.quotePath=false diff -U0 "$BASE_SHA" "$HEAD_SHA" -- "$f") || exit 3
                      # title/description — работа над сниппетом выдачи, фактура не тронута.
                      OTHER=$(printf '%s\n' "$FDIFF" \
                        | grep -E '^[+-]' | grep -vE '^(\+\+\+|---)' \
                        | grep -vE '^[+-](title|description|updatedDate):' || true)
                      if [ -n "$OTHER" ] && ! printf '%s\n' "$FDIFF" | grep -qE '^\+updatedDate:'; then
                        printf 'POST %s\n' "$f"
                      fi
                      ;;
                    (*)
                      # Замена картинки существующего поста. Если это hero-обложка
                      # (файл указан в coverImage какого-то поста) — перекадрирование
                      # или пережатие ради веса/LCP НЕ трогает фактуру: цены и визы в
                      # тексте те же. Требовать за это бамп DATA_UPDATED = врать о
                      # проверке данных. Инфографику с цифрами (не coverImage) гейт
                      # по-прежнему считает фактурой. Признак — путь в coverImage
                      # фронтматтера, а не имя файла (обложки называются по-разному).
                      # Имя файла — fixed-string (grep -F), не регексп: точка в
                      # расширении не должна стать шаблоном, а сам путь — из git diff
                      # репозитория, не из метаданных PR (инъекции нет).
                      base="${f##*/}"
                      if grep -rhE '^coverImage:' src/content/blog --include='*.md' --include='*.mdx' \
                           | grep -qF "$base"; then
                        : # hero-обложка — свежесть несёт pubDate/updatedDate поста, не DATA_UPDATED
                      else
                        printf 'DATA %s\n' "$f"
                      fi
                      ;;
                  esac
                  ;;
                (*) printf 'DATA %s\n' "$f" ;;
              esac
            done <<< "$CONTENT"
          ) || { echo "✖ не удалось прочитать git diff — гейт не может судить о свежести"; exit 1; }
          STALE_POSTS=$(printf '%s\n' "$VERDICT" | sed -n 's/^POST //p')
          DATA_TOUCHED=$(printf '%s\n' "$VERDICT" | sed -n 's/^DATA //p')
          FAIL=0
          if [ -n "$STALE_POSTS" ]; then
            echo "✖ правлено тело поста, но updatedDate не бампнут:"
            printf '%s\n' "$STALE_POSTS" | sed 's/^/    /'
            echo "  Бампни updatedDate этих постов — из неё sitemap берёт lastmod."
            FAIL=1
          fi
          if [ -n "$DATA_TOUCHED" ] && ! echo "$CHANGED" | grep -qx 'src/data/meta.js'; then
            echo "✖ изменена фактура данных, но src/data/meta.js (DATA_UPDATED) не тронут:"
            printf '%s\n' "$DATA_TOUCHED" | sed 's/^/    /'
            echo "  Бампни дату актуальности — иначе byline «данные проверены …» соврёт."
            FAIL=1
          fi
          if [ "$FAIL" = 1 ]; then exit 1; fi
          echo "✔ свежесть в порядке: у правленых постов бампнут updatedDate, у фактуры данных — DATA_UPDATED"
