name: Update flight prices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests -q
      - run: python fetch_prices.py
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
      - run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update flight prices"
          git push
