name: Update flight prices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch prices from Travelpayouts
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
        run: node scripts/fetch-prices.mjs
      - name: Commit and push if changed
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add src/data/prices-cache.json
          git diff --staged --quiet || git commit -m "chore: update flight prices"
          git push
