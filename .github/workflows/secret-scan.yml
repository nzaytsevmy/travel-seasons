name: secret-scan
# CI-бэкстоп: ищет закоммиченные секреты (форматы ключей / PGPASSWORD-литерал).
# grep-based, без внешних экшенов/лицензий. Консистентно с ~/.claude/hooks/secret-scan.sh.
on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for secret formats
        shell: bash
        run: |
          set -uo pipefail
          PAT='(sk-(ant-)?[A-Za-z0-9_-]{16,}|ghp_[A-Za-z0-9]{20,}|gho_[A-Za-z0-9]{20,}|glpat-[A-Za-z0-9_-]{16,}|xox[baprs]-[A-Za-z0-9-]{10,}|AKIA[0-9A-Z]{16}|AIza[A-Za-z0-9_-]{30,}|y0_[A-Za-z0-9_-]{20,}|fc-[A-Za-z0-9]{20,}|(sk|rk|pk)_live_[A-Za-z0-9]{16,}|[0-9]{8,10}:AA[A-Za-z0-9_-]{30,})'
          PG='PGPASSWORD[[:space:]]*=[[:space:]]*['"'"'"]?[^$ ]{6,}'
          fail=0
          if git ls-files -z | xargs -0 grep -nEI "$PAT" 2>/dev/null; then echo "::error::Возможный секрет (формат ключа) в коммите"; fail=1; fi
          if git ls-files -z | xargs -0 grep -nEI "$PG" 2>/dev/null; then echo "::error::Возможный PGPASSWORD-литерал в коммите"; fail=1; fi
          if [ "$fail" = 0 ]; then echo "secret-scan: clean"; fi
          exit $fail
