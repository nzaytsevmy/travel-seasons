name: Deploy to REG.RU

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}

      - name: Install deps (on cache miss)
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Astro asset transforms
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro
            .astro
          key: astro-cache-${{ runner.os }}-${{ hashFiles('src/**', 'public/**', 'astro.config.mjs', 'package-lock.json') }}
          restore-keys: |
            astro-cache-${{ runner.os }}-

      - run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan server290.hosting.reg.ru >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          rsync -avz --delete \
            --exclude='.well-known' \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            u3502181@server290.hosting.reg.ru:/var/www/u3502181/data/www/traveltribe.ru/

      - name: Collect changed files
        id: changed
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            FILES=$(git show --pretty="" --name-only HEAD)
          fi
          {
            echo 'files<<EOF'
            echo "$FILES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Ping IndexNow + Yandex recrawl
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          YANDEX_OAUTH_TOKEN: ${{ secrets.YANDEX_OAUTH_TOKEN }}
          YANDEX_USER_ID: ${{ secrets.YANDEX_USER_ID }}
        run: python3 .github/scripts/seo_ping.py
