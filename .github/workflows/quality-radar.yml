name: Quality Radar

on:
  schedule:
    - cron: '0 7 * * 1'    # Пн 07:00 UTC = 10:00 МСК — час после SEO Pulse (0 6 * * 1)
  workflow_dispatch: {}

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # На уровне job, не workflow — принцип наименьших привилегий (единственная
    # job сейчас, но если появятся другие — им не нужны contents/id-token).
    permissions:
      contents: write
      # claude-code-action меняет OIDC-токен раннера на скоуп-токен через
      # Anthropic-сервис — без этого падает на первом же шаге с "Could not
      # fetch an OIDC token" (проверено живым прогоном 14.07.2026, run 29335966071).
      id-token: write
    steps:
      # fetch-depth:0 — агент сам делает git pull --rebase перед push; shallow-clone
      # может дать "refusing to merge unrelated histories" в редких edge-case
      # (ручное вмешательство/много промежуточных коммитов за неделю).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Radar краулит живой прод (traveltribe.ru), не dist/ — chromium достаточно
      # для @360/@1280 интерактивных проверок (webkit не нужен, в отличие от
      # пиксельной визуальной регрессии).
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Git identity for radar commits
        run: |
          git config user.name "quality-radar-bot"
          git config user.email "quality-radar@traveltribe.ru"

      - name: Run Quality Radar
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Выполни процедуру еженедельного аудита прода traveltribe.ru из radar/SKILL.md
            в этом репозитории. Прочитай файл целиком и следуй ему буквально:

            - Дедуп сначала: прочитать radar/findings.json, свериться, нет ли уже
              актуального отчёта этой недели без изменений в main с момента генерации.
            - Скоуп/анти-скоуп — строго по таблице в SKILL.md, не дублировать check:seo/
              content-invariants/lighthouse/visual-tests/SEO Pulse.
            - Live-краул https://traveltribe.ru (не localhost/dist/build) — Playwright
              @360 и @1280, триггерить интерактив (фильтры/калькулятор/сравнение),
              ассерт видимости ПОСЛЕ клика (offsetParent/computed display), не просто
              DOM-наличие.
            - Обновить radar/findings.json (дедуп по id: перепроверить open-находки,
              добавить новые, НЕ репортить повторно fixed/wontfix).
            - Записать/обновить radar/RADAR-<год>-W<неделя>.md по формату из SKILL.md.
            - Скрин-доказательства P1/P2 находок → radar/assets/.
            - Никогда не открывать PR — коммитить report+findings.json+assets ПРЯМО
              в main. Git identity уже настроен (quality-radar-bot). Push с ретраем:
              `git pull --rebase --autostash origin main`, затем push, до 3 попыток
              с паузой 5с между ними при неудаче (та же гонка возможна, что и у
              seo-pulse.yml — другие workflow пушат в main тем же часом).
            - Telegram: у тебя НЕТ доступа к токену бота (осознанно — секрет не передан
              этому шагу отдельно, чтобы содержимое живой веб-страницы не могло его
              выманить). Если есть реальная дельта с прошлого прогона (новые находки/
              смена статуса) — запиши готовый текст уведомления в файл
              /tmp/radar-tg-message.txt (НЕ в репозиторий — это временный файл
              раннера, не коммить его). Если дельты нет — не создавай файл вообще,
              тишина это нормальный результат.
            - Если нужное действие заблокировано доступными тебе инструментами — не
              пытайся обойти ограничение, заверши задачу и честно опиши в отчёте, что
              не удалось сделать и почему.
            - Auto-fix запрещён: только отчёт и предложенный фикс текстом, код
              компонентов/контент/schema не трогать.
          # Временно для диагностики: run 29344285936 упёрся в --max-turns 60
          # (61 ход сделал, реальная работа, $2.27 — не блокировка прав, а нехватка
          # запаса), плюс 8 оставшихся permission_denials без видимого текста —
          # show_full_output снова включаю чтобы увидеть их. Первый прогон
          # (нет существующего отчёта, полный краул с нуля) закономерно тяжелее
          # штатных еженедельных — те будут легче за счёт дедупа по findings.json.
          show_full_output: true
          claude_args: |
            --max-turns 150 --allowedTools "Write,Edit,Bash(git config *),Bash(git add *),Bash(git commit *),Bash(git pull *),Bash(git push *),Bash(git status *),Bash(git diff *),Bash(git log *),Bash(npx *),Bash(npm *),Bash(node *),Bash(mkdir *),Bash(ls *),Bash(cat *),Bash(pwd)"

      # Детерминированный шаг, не агент — токен бота никогда не проходит через
      # LLM-контекст (защита от эксфильтрации через prompt injection с живой
      # страницы, которую агент читает на шаге выше).
      - name: Send Telegram delta (if any)
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -f /tmp/radar-tg-message.txt ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=$(cat /tmp/radar-tg-message.txt)" \
              >/dev/null || true
          else
            echo "Нет файла /tmp/radar-tg-message.txt — дельты не было, тишина."
          fi

      - name: Alert on job failure
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=🚨 Quality Radar: GHA job упал (run ${{ github.run_id }}). Проверь Actions." \
            >/dev/null || true
