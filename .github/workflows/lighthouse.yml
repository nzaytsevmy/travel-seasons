name: Lighthouse CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [desktop, mobile]
    name: ${{ matrix.preset }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse (${{ matrix.preset }})
        run: |
          npm install -g @lhci/cli
          if [ "${{ matrix.preset }}" = "mobile" ]; then
            lhci autorun --config=./lighthouserc.mobile.json
          else
            lhci autorun --config=./lighthouserc.json
          fi
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
