name: SEO Pulse

on:
  schedule:
    - cron: '0 6 * * 1'              # Пн 06:00 UTC = 09:00 МСК — полный отчёт
    - cron: '0 6 * * 0,2,3,4,5,6'    # остальные дни — лёгкий алерт-режим
  workflow_dispatch:
    inputs:
      mode:
        description: Режим прогона
        type: choice
        options: [weekly, alert]
        default: weekly

permissions:
  contents: write

concurrency:
  group: seo-pulse
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # fetch-depth:0 — radar_watchdog (C5) читает git log по radar/RADAR-*.md
      # для C5; дефолтный fetch-depth:1 даёт историю только из ОДНОГО коммита
      # (тем main, который случайно оказался HEAD при чекауте) — если это не
      # сам радар-коммит (обычно так и есть, main двигают и другие workflow),
      # git log ничего не найдёт и watchdog будет ложно кричать «отчётов нет».
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SEO pulse report
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          YANDEX_OAUTH_TOKEN: ${{ secrets.YANDEX_OAUTH_TOKEN }}
          YANDEX_USER_ID: ${{ secrets.YANDEX_USER_ID }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            if [ "${{ github.event.schedule }}" = "0 6 * * 1" ]; then
              MODE=weekly
            else
              MODE=alert
            fi
          fi
          echo "SEO Pulse mode: $MODE"
          python3 .github/scripts/seo_pulse.py --mode "$MODE"

      - name: Commit report (weekly only produces changes)
        run: |
          git config user.name "seo-pulse-bot"
          git config user.email "seo-pulse@traveltribe.ru"
          git add seo-pulse/
          if git diff --cached --quiet; then
            echo "Нет изменений — коммит не нужен (alert-режим)"
            exit 0
          fi
          git commit -m "seo-pulse: $(date -u +%Y-%m-%d) report"
          for i in 1 2 3; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push; then
              exit 0
            fi
            echo "push: попытка $i не удалась (гонка с другим коммитом), повтор через 5с..."
            sleep 5
          done
          echo "push не прошёл после 3 попыток" >&2
          exit 1

      - name: Alert on job failure
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=🚨 SEO Pulse: GHA job упал (run ${{ github.run_id }}). Мониторинг не отработал — проверь Actions." \
            >/dev/null || true
