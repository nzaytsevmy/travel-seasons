name: Visual Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual:
    runs-on: ubuntu-latest
    # Без лимита job наследовал дефолтные 6 ч — зависший прогон крутился часами.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - run: npm run build

      - name: Start preview server
        run: npm run preview &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:4322/ > /dev/null && exit 0
            sleep 2
          done
          echo "✖ preview-сервер не поднялся за 120с"; exit 1

      - name: Run visual regression tests
        run: npm run check:visual
        env:
          PREVIEW_URL: http://localhost:4322

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/.html-report/
            test-results/
          retention-days: 14
